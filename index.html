<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP-SH</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div id="map"></div>

    <header class="app-header">
      <form class="search-bar" id="search-form" role="search" autocomplete="off">
        <label for="search-input" class="sr-only">Buscar dirección IP o dominio</label>
        <input
          type="text"
          id="search-input"
          name="search"
          placeholder="Buscar IP o dominio"
          aria-describedby="search-error"
        >
        <button type="submit" class="search-btn" aria-label="Buscar">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
          </svg>
        </button>
      </form>
      <p class="search-error" id="search-error" role="alert" aria-live="polite"></p>
    </header>

    <button class="theme-toggle" id="theme-toggle" type="button" aria-pressed="false">
      <span class="theme-toggle__label" id="theme-toggle-label">Modo oscuro</span>
      <span class="theme-toggle__switch">
        <span class="theme-toggle__knob"></span>
      </span>
    </button>

    <button class="locate-btn" id="locate-btn" type="button" aria-label="Volver a mi ubicación">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"></circle>
        <line x1="12" y1="2" x2="12" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
        <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
        <line x1="2" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
        <line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
      </svg>
    </button>

    <div class="loader" id="loader" aria-hidden="true">
      <span class="loader__spinner"></span>
      <span class="loader__text">Cargando…</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
  </main>
</body>
</html>
